<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>今日热榜 Daily Fun</title>
  <meta name="description" content="每天自动更新的中文热榜与趣味内容集合。" />
  <link rel="stylesheet" href="styles.css?v=20260701-2" />
</head>
<body>
  <div class="bg-orb orb-one"></div>
  <div class="bg-orb orb-two"></div>

  <header class="hero">
    <nav class="nav">
      <a class="brand" href=".">Daily Fun</a>
      <a href="#today">今日</a>
      <a href="#archive">往期</a>
      <a href="https://github.com/yanshihao/daily-fun-page" target="_blank" rel="noreferrer">GitHub</a>
    </nav>

    <section class="hero-inner">
      <p class="kicker">今日热榜日报</p>
      <h1>今日热榜</h1>
      <p class="subtitle">自动整理百度热搜、B站热门和中文科技内容。少一点信息噪音，多一点今天正在发生的有趣事情。</p>
      <div class="status-row">
        <div class="status" id="status">正在读取今日内容……</div>
        <button class="latest-button" id="latestButton" type="button" hidden>回到最新</button>
      </div>
    </section>
  </header>

  <main>
    <section id="today" class="section">
      <div class="section-head">
        <p>Today</p>
        <h2 id="todayTitle">今日精选</h2>
      </div>
      <div class="grid" id="cards"></div>
    </section>

    <section id="archive" class="section archive-section">
      <div class="section-head">
        <p>Archive</p>
        <h2>最近往期</h2>
      </div>
      <div class="archive-list" id="archiveList"></div>
    </section>
  </main>

  <footer>
    <p>由 GitHub Actions 每日自动更新 · 静态托管于 GitHub Pages</p>
  </footer>

  <template id="cardTemplate">
    <article class="card">
      <div class="card-top">
        <span class="emoji"></span>
        <span class="source"></span>
      </div>
      <h3></h3>
      <p class="summary"></p>
      <a class="read-more" target="_blank" rel="noreferrer">查看来源</a>
    </article>
  </template>

  <script src="script.js?v=20260701-2"></script>
</body>
</html>
