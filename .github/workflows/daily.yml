name: Collect Daily Fun

on:
  schedule:
    # Run every day at 00:20 UTC.
    - cron: "20 0 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate daily data
        run: python scripts/collect_daily.py

      - name: Commit daily data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update daily fun data"
          file_pattern: data/*.json data/archive/*.json data/versions/*.json
